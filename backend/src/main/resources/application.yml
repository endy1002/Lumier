spring:
  application:
    name: lumier-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lumier?sslmode=disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,https://lumierueh.vercel.app}
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
