spring:
  application:
    name: lumier-backend
  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_FILE_SIZE:200MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:200MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lumier?sslmode=disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://lumierueh.vercel.app}
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    admin-emails: ${ADMIN_EMAILS:}
  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:backend/uploads}
  supabase:
    enabled: ${SUPABASE_STORAGE_ENABLED:false}
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:lumier-media}
    public-base-url: ${SUPABASE_STORAGE_PUBLIC_BASE_URL:}
    request-timeout-seconds: ${SUPABASE_STORAGE_REQUEST_TIMEOUT_SECONDS:180}
    allow-local-fallback: ${SUPABASE_STORAGE_ALLOW_LOCAL_FALLBACK:false}
  umami:
    base-url: ${UMAMI_API_BASE_URL:https://api.umami.is/v1}
    api-key: ${UMAMI_API_KEY:}
    website-id: ${UMAMI_WEBSITE_ID:}
